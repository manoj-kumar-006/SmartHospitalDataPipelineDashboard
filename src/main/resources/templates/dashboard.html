<!DOCTYPE html>
<html>
<head>

    <title>Hospital Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        .kpi-container{
            display:flex;
            gap:20px;
            margin-bottom:30px;
        }

        .kpi-card{
            padding:20px;
            background:#f4f4f4;
            border-radius:8px;
            width:200px;
            text-align:center;
            font-size:20px;
        }

    </style>

</head>

<body>

<h2>Hospital Analytics Dashboard</h2>

<div class="kpi-container">

    <div class="kpi-card">
        Total Patients
        <div id="totalPatients"></div>
    </div>

    <div class="kpi-card">
        Avg Heart Rate
        <div id="avgHeartRate"></div>
    </div>

    <div class="kpi-card">
        Top Disease
        <div id="topDisease"></div>
    </div>

</div>
<h3>Live Patient Vitals</h3>

<div id="liveVitals">
    Heart Rate: <span id="hr"></span><br>
    Temperature: <span id="temp"></span><br>
    Blood Pressure: <span id="bp"></span>
</div>

<h3>Disease Distribution</h3>
<canvas id="diseaseChart"></canvas>


<h3>Daily Admissions</h3>
<canvas id="admissionChart"></canvas>

<script>

    // KPI DATA

    fetch('/analytics/kpi')
        .then(res => res.json())
        .then(data => {

            document.getElementById("totalPatients").innerText = data.totalPatients;
            document.getElementById("avgHeartRate").innerText = data.avgHeartRate;
            document.getElementById("topDisease").innerText = data.topDisease;

        });

    // DISEASE CHART

    fetch('/analytics/diseases')
        .then(res => res.json())
        .then(data => {

            const labels = Object.keys(data);
            const values = Object.values(data);

            new Chart(document.getElementById("diseaseChart"), {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{ data: values }]
                }
            });

        });

    // ADMISSIONS CHART

    fetch('/analytics/admissions')
        .then(res => res.json())
        .then(data => {

            const labels = Object.keys(data);
            const values = Object.values(data);

            new Chart(document.getElementById("admissionChart"), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label:"Admissions",
                        data: values
                    }]
                }
            });

        });


        function updateVitals(){

        fetch('/live/vitals')
            .then(res=>res.json())
            .then(data=>{

                document.getElementById("hr").innerText = data.heartRate;
                document.getElementById("temp").innerText = data.temperature;
                document.getElementById("bp").innerText = data.bloodPressure;

            });

    }

        setInterval(updateVitals,3000);


</script>

</body>
</html>
